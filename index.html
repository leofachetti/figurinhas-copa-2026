<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Figurinhas Copa 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1a5632; --gold: #f0c040; --red: #d32f2f; --orange: #e67e22;
  --yellow: #b8860b; --gray: #999; --bg: #f5f5f5; --card: #fff;
  --text: #222; --muted: #666; --radius: 10px;
  --none-bg: #ffebee; --none-border: #ef9a9a;
  --a1-bg: #fff3e0; --a1-border: #ffcc80;
  --a2-bg: #fffde7; --a2-border: #fff176;
  --both-bg: #e8f5e9; --both-border: #a5d6a7;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Top bar: header + toolbar stick together */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
header {
  background: linear-gradient(135deg, #0d3319, var(--green));
  color: #fff; padding: 10px 12px 8px;
}
header h1 { font-size: 1rem; text-align: center; margin-bottom: 6px; }
header h1 span { color: var(--gold); }
.stats-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
.stat-pill {
  background: rgba(255,255,255,.15); border-radius: 20px; padding: 3px 8px;
  font-size: .68rem; white-space: nowrap; backdrop-filter: blur(4px);
}
.stat-pill b { font-size: .8rem; }

/* Toolbar */
.toolbar {
  display: flex; gap: 5px; padding: 6px 10px; background: #fff;
  border-bottom: 1px solid #ddd; flex-wrap: wrap;
}
.toolbar input {
  flex: 1; min-width: 100px; border: 1px solid #ccc; border-radius: 8px;
  padding: 8px 12px; font-size: .9rem; outline: none;
}
.toolbar input:focus { border-color: var(--green); }
.toolbar button {
  border: 1px solid #ccc; border-radius: 8px; padding: 8px 12px;
  font-size: .8rem; font-weight: 600; cursor: pointer; background: #fff;
  white-space: nowrap; display: flex; align-items: center; gap: 4px;
  transition: all .15s;
}
.toolbar button:active { transform: scale(.96); }
.btn-filter { color: var(--green); }
.btn-filter.active { background: var(--green); color: #fff; border-color: var(--green); }
.btn-copy { background: var(--gold); border-color: var(--gold); color: #333; }

/* Sections */
main { padding: 8px 8px 100px; }
.section {
  background: var(--card); border-radius: var(--radius); margin-bottom: 8px;
  overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.section-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
  font-weight: 600; font-size: .9rem; border-bottom: 1px solid #eee;
}
.section-header:active { background: #f9f9f9; }
.section-header .flag { font-size: 1.3rem; }
.section-header .name { flex: 1; }
.section-header .badge {
  font-size: .7rem; padding: 2px 8px; border-radius: 12px; font-weight: 600;
}
.badge-danger { background: #ffebee; color: var(--red); }
.badge-warn { background: #fff3e0; color: var(--orange); }
.badge-ok { background: #e8f5e9; color: #2e7d32; }
.section-header .arrow { transition: transform .2s; font-size: .7rem; color: #999; }
.section-header.open .arrow { transform: rotate(180deg); }

.section-body { display: none; }
.section-body.open { display: block; }

/* Sticker row */
.sticker {
  display: flex; align-items: center; gap: 8px; padding: 6px 12px;
  border-bottom: 1px solid #f0f0f0; font-size: .85rem;
  min-height: 42px;
}
.sticker:last-child { border-bottom: none; }
.sticker .code { font-weight: 700; font-family: 'SF Mono', 'Menlo', monospace; min-width: 50px; font-size: .8rem; }
.sticker .need { font-size: .7rem; font-weight: 700; min-width: 22px; text-align: center; }
.need-2 { color: var(--red); }
.need-1 { color: var(--orange); }
.sticker .btns { display: flex; gap: 6px; margin-left: auto; }
.sticker .btns button {
  width: 38px; height: 34px; border-radius: 8px; border: 2px solid #ddd;
  font-size: .65rem; font-weight: 700; cursor: pointer; background: #fff;
  transition: all .12s; -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
}
.sticker .btns button:active { transform: scale(.92); }
.btn-a1 { min-width: 38px; }
.btn-a2 { min-width: 38px; }
.btn-a1.off { border-color: #ddd; background: #fafafa; color: #aaa; }
.btn-a1.on { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
.btn-a2.off { border-color: #ddd; background: #fafafa; color: #aaa; }
.btn-a2.on { border-color: #2196f3; background: #e3f2fd; color: #1565c0; }

/* Footer */
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-state .icon { font-size: 3rem; margin-bottom: 10px; }
.empty-state p { font-size: .9rem; line-height: 1.5; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 20px; border-radius: 24px;
  font-size: .85rem; z-index: 999; opacity: 0; transition: opacity .3s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

@media (min-width: 600px) {
  main { max-width: 700px; margin: 0 auto; padding: 12px 16px 60px; }
  .toolbar { justify-content: center; }
  .stats-row { gap: 10px; }
  .stat-pill { font-size: .78rem; padding: 5px 12px; }
}
</style>
</head>
<body>

<div class="top-bar">
<header>
  <h1>🏆 <span>Copa 2026</span> · Dois Álbuns</h1>
  <div class="stats-row" id="stats"></div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="🔍 Buscar figurinha..." autocomplete="off">
  <button class="btn-filter active" data-filter="missing" id="btn-missing">❌ Faltando</button>
  <button class="btn-filter" data-filter="all" id="btn-all">📋 Todas</button>
  <button class="btn-copy" id="btn-copy">📋 Copiar</button>
  <button class="btn-filter" id="btn-collapse">📂 Recolher</button>
</div>
</div><!-- .top-bar -->

<main id="main"></main>

<div style="text-align:center;padding:20px;">

const faltamA1 = new Set(FALTAM_A1_RAW);
const album2Has = new Set(ALBUM2_HAS_RAW);

// ============================================================
// PERSISTENCE: localStorage
// ============================================================
const STORAGE_KEY = 'figurinhas-copa2026-v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

// Initialize or load state
// State: { [code]: { a1: bool, a2: bool } } — true = HAS the sticker
let state = loadState();

  state = {};
  ALL_CODES.forEach(code => {
    state[code] = {
      a1: !faltamA1.has(code),  // A1 has if NOT in faltam list
      a2: album2Has.has(code)    // A2 has if IN repetidas list
    };
  });
  saveState(state);
}

// ============================================================
// DERIVED DATA
// ============================================================
function status(code) {
  const s = state[code];
  if (!s) return 'none';
  if (s.a1 && s.a2) return 'both';
  if (s.a1) return 'a1';
  if (s.a2) return 'a2';
  return 'none';
}

function needCount(code) {
  const st = status(code);
  if (st === 'none') return 2;
  if (st === 'a1' || st === 'a2') return 1;
  return 0;
}

function computeStats() {
  let a1Has = 0, a2Has = 0, bothHave = 0, bothMissing = 0, oneMissing = 0;
  ALL_CODES.forEach(code => {
    const s = state[code];
    if (s.a1) a1Has++;
    if (s.a2) a2Has++;
    if (s.a1 && s.a2) bothHave++;
    else if (!s.a1 && !s.a2) bothMissing++;
    else oneMissing++;
  });
  return { a1Has, a2Has, bothHave, bothMissing, oneMissing, total: TOTAL };
}

  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $toast.classList.remove('show'), 2000);
}

  const s = computeStats();

}

    let filtered = codes;
    if (currentFilter === 'missing') {
      filtered = codes.filter(c => needCount(c) > 0);
    }
    if (q) {
      filtered = filtered.filter(c => c.toLowerCase().includes(q));
    }
    if (filtered.length === 0) return;

    // Count section stats
    const totalSec = codes.length;
    const missingSec = codes.filter(c => needCount(c) > 0).length;
    const bothMissingSec = codes.filter(c => needCount(c) === 2).length;

    let badgeClass = 'badge-ok';
    if (bothMissingSec > 0) badgeClass = 'badge-danger';
    else if (missingSec > 0) badgeClass = 'badge-warn';

    // Only show relevant count based on filter
    const countLabel = currentFilter === 'missing'
      ? `${missingSec}/${totalSec}`
      : `${totalSec - missingSec}/${totalSec}`;

    html += `<div class="section">`;
    html += `<div class="section-header" data-section="${si}">`;
    html += `<span class="flag">${flag}</span>`;
    html += `<span class="name">${name}</span>`;
    html += `<span class="badge ${badgeClass}">${countLabel}</span>`;
    // Auto-open sections that have missing stickers when in missing mode
    const openClass = (currentFilter === 'missing' && missingSec > 0) ? ' open' : '';
    html += `<span class="arrow${openClass}">▼</span>`;
    html += `</div>`;
    html += `<div class="section-body${openClass}">`;

    filtered.forEach(code => {
      const st = status(code);
      const nc = needCount(code);
      let needLabel = '', needClass = '';
      if (nc === 2) { needLabel = '2x'; needClass = 'need-2'; }
      else if (nc === 1) { needLabel = '1x'; needClass = 'need-1'; }

      const a1on = state[code].a1 ? 'on' : 'off';
      const a2on = state[code].a2 ? 'on' : 'off';
      const a1label = state[code].a1 ? '✅' : '❌';
      const a2label = state[code].a2 ? '✅' : '❌';

      html += `<div class="sticker" data-code="${code}">`;
      html += `<span class="code">${code}</span>`;
      // Only show need badge when missing
      if (nc > 0) {
        html += `<span class="need ${needClass}">${needLabel}</span>`;
      } else {
        html += `<span class="need"></span>`;
      }
      html += `<span class="btns">`;
      html += `<button class="btn-a1 ${a1on}" data-action="a1" data-code="${code}" aria-label="Álbum 1">${a1label}₁</button>`;
      html += `<button class="btn-a2 ${a2on}" data-action="a2" data-code="${code}" aria-label="Álbum 2">${a2label}₂</button>`;
      html += `</span>`;
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  if (!html) {
    html = `<div class="empty-state">
      <div class="icon">🎉</div>
      <p><strong>Nenhuma figurinha encontrada!</strong><br>
      ${currentFilter === 'missing' ? 'Todos os álbuns estão completos ou o filtro não encontrou resultados.' : 'Nenhuma figurinha corresponde à busca.'}</p>
    </div>`;
  }

  $main.innerHTML = html;

  // Wire section toggles
  $main.querySelectorAll('.section-header').forEach(header => {
    header.addEventListener('click', () => {
      const body = header.nextElementSibling;
      const arrow = header.querySelector('.arrow');
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open');
      if (isOpen) {
        arrow.classList.remove('open');
        header.classList.remove('open');
      } else {
        arrow.classList.add('open');
        header.classList.add('open');
      }
    });
  });

  // Wire sticker buttons
  $main.querySelectorAll('.sticker button').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const code = btn.dataset.code;
      const album = btn.dataset.action; // 'a1' or 'a2'
      toggleSticker(code, album);
    });
  });
}

function toggleSticker(code, album) {
  state[code][album] = !state[code][album];
  saveState(state);

  // Update just that sticker's row in-place
  const row = $main.querySelector(`.sticker[data-code="${code}"]`);
  if (!row) { renderAll(); return; } // fallback

  const st = status(code);
  const nc = needCount(code);

  // Update need badge
  const needEl = row.querySelector('.need');
  if (needEl) {
    needEl.textContent = nc === 2 ? '2x' : nc === 1 ? '1x' : '';
    needEl.className = 'need ' + (nc === 2 ? 'need-2' : nc === 1 ? 'need-1' : '');
  }

  // Update buttons
  const btnA1 = row.querySelector('.btn-a1');
  const btnA2 = row.querySelector('.btn-a2');
  if (btnA1) {
    btnA1.className = 'btn-a1 ' + (state[code].a1 ? 'on' : 'off');
    btnA1.textContent = (state[code].a1 ? '✅' : '❌') + '₁';
  }
  if (btnA2) {
    btnA2.className = 'btn-a2 ' + (state[code].a2 ? 'on' : 'off');
    btnA2.textContent = (state[code].a2 ? '✅' : '❌') + '₂';
  }

  // If filtering to missing and this sticker is now complete, hide it
  if (currentFilter === 'missing' && nc === 0) {
    const section = row.closest('.section');
    row.style.opacity = '0';
    row.style.maxHeight = '0';
    row.style.padding = '0';
    row.style.overflow = 'hidden';
    row.style.transition = 'all .3s';
    setTimeout(() => {
      row.remove();
      if (section) {
        const body = section.querySelector('.section-body');
        if (body && body.querySelectorAll('.sticker').length === 0) {
          section.style.display = 'none';
        } else {
          updateSectionBadge(section);
        }
      }
    }, 300);
  }

  renderStats();
}

function updateSectionBadge(sectionEl) {
  const body = sectionEl.querySelector('.section-body');
  const badge = sectionEl.querySelector('.badge');
  if (!body || !badge) return;
  const stickers = body.querySelectorAll('.sticker');
  const total = stickers.length;
  // Count missing in this section: stickers with need-1 or need-2 class
  const missing2 = body.querySelectorAll('.need-2').length;
  const missing1 = body.querySelectorAll('.need-1').length;
  const missing = missing2 + missing1;

  // Determine the right label based on current filter
  if (currentFilter === 'missing') {
    badge.textContent = `${missing}/${total}`;
  } else {
    badge.textContent = `${total - missing}/${total}`;
  }

  // Update badge color
  badge.className = 'badge ';
  if (missing2 > 0) badge.className += 'badge-danger';
  else if (missing1 > 0) badge.className += 'badge-warn';
  else badge.className += 'badge-ok';
}

function checkEmptySections() {
  $main.querySelectorAll('.section').forEach(section => {
    const body = section.querySelector('.section-body');
    if (body && body.querySelectorAll('.sticker').length === 0) {
      section.style.display = 'none';
    }
  });
}

// ============================================================
// SHARE / COPY
// ============================================================
function generateShareText() {
  const s = computeStats();

  let text = '🏆 *Faltam Copa 2026 — Dois Álbuns*\n';
  const p1 = Math.round(s.a1Has / s.total * 100);
  const p2 = Math.round(s.a2Has / s.total * 100);
  text += `📊 A1: ${s.a1Has}/${s.total} (${p1}%) | A2: ${s.a2Has}/${s.total} (${p2}%)\n`;

  // Group missing stickers by country
  SECTIONS.forEach(([flag, name, codes]) => {
    const parts = [];
    codes.forEach(code => {
      const nc = needCount(code);
      if (nc === 0) return; // both have, skip
      parts.push(nc === 2 ? `${code} x2` : code);
    });
    if (parts.length === 0) return; // nothing missing in this country

    text += `\n${flag} *${name}:*\n${parts.join(', ')}\n`;
  });

  text += `\n🤝 Bora trocar? 📲`;
  return text;
}

function copyShareText() {
  const text = generateShareText();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('✅ Copiado! Cole no WhatsApp ou onde quiser.');
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('✅ Copiado!'); }
  catch(e) { showToast('❌ Erro ao copiar. Tente de novo.'); }
  document.body.removeChild(ta);
}

// ============================================================
// EVENT HANDLERS
// ============================================================
$btnMissing.addEventListener('click', () => {
  currentFilter = 'missing';
  $btnMissing.classList.add('active');
  $btnAll.classList.remove('active');
  renderAll();
});

$btnAll.addEventListener('click', () => {
  currentFilter = 'all';
  $btnAll.classList.add('active');
  $btnMissing.classList.remove('active');
  renderAll();
});

$btnCopy.addEventListener('click', copyShareText);

const $btnCollapse = document.getElementById('btn-collapse');
$btnCollapse.addEventListener('click', () => {
  const isCollapsing = $btnCollapse.textContent.includes('Recolher');
  const bodies = $main.querySelectorAll('.section-body');
  const arrows = $main.querySelectorAll('.section-header .arrow');
  const headers = $main.querySelectorAll('.section-header');
  bodies.forEach(b => b.classList.toggle('open', !isCollapsing));
  arrows.forEach(a => a.classList.toggle('open', !isCollapsing));
  headers.forEach(h => h.classList.toggle('open', !isCollapsing));
  $btnCollapse.textContent = isCollapsing ? '📂 Expandir' : '📂 Recolher';
});

let searchDebounce;
$search.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    searchQuery = $search.value;
    renderAll();
  }, 200);
});

// ============================================================
// KEYBOARD SHORTCUT
// ============================================================
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'c') {
    // Only intercept if no text is selected (user wants to copy share text)
    const sel = window.getSelection().toString();
    if (!sel && document.activeElement === document.body) {
      e.preventDefault();
      copyShareText();
    }
  }
});

// ============================================================
// INITIAL RENDER
// ============================================================
renderAll();

// ============================================================
// RESET (hidden at bottom)
// ============================================================
document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('Tem certeza? Isso vai apagar todas as suas marcações e voltar aos dados iniciais.')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
});
</script>
